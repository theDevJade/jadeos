server {
    listen 5883;
    listen [::]:5883;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Traefik / Coolify terminate TLS; this container only serves plain HTTP.

    gzip on;
    gzip_types text/html text/css application/javascript application/wasm;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.js$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Cache audio assets aggressively.
    location ~* \.(mp3|wav|ogg|m4a|aac|flac)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Cache image/video frame assets (used by badapple sequence).
    location ~* \.(png|jpg|jpeg|webp|gif|bmp|avif)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Sequence manifest may change independently, so keep a shorter cache.
    location = /media/badapple/sequence.txt {
        add_header Cache-Control "public, max-age=3600" always;
    }
}
