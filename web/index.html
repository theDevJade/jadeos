<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JadeOS Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <meta name="description" content="Interactive portfolio running a custom RISC CPU and software GPU." />
  <meta property="og:title" content="JadeOS Portfolio" />
  <meta property="og:description" content="A custom portfolio OS running in your browser via WebAssembly." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="boot-ui">
    <h1>JadeOS</h1>
    <!-- Fun ampersand denotions --> 
    <p class="sub">WebAssembly &nbsp;&middot;&nbsp; Custom RISC ISA &nbsp;&middot;&nbsp; Software GPU</p>
    <div class="field">
      <label>Emulated RAM</label>
      <select id="mem-select">
        <option value="16" selected>16 MiB (default)</option>
        <option value="32">32 MiB</option>
        <option value="64">64 MiB</option>
        <!-- Big RAM --> 
        <option value="128">128 MiB</option>
      </select>
    </div>
    <button id="boot-btn">Boot</button>
  </div>

  <canvas id="screen"></canvas>
  <div id="fps"></div>
  <div id="clip-preload" role="status" aria-live="polite">
    <div class="clip-preload-label" id="clip-preload-text">Clip</div>
    <progress id="clip-preload-bar" max="100" value="0"></progress>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
